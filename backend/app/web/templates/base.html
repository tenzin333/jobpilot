<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job Applier Agent{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="loadbar"></div>
  <header class="topbar">
    <strong>Job Applier Agent</strong>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/setup">Setup</a>
      <a href="/jobs">Jobs</a>
      <a href="/matches">Matches</a>
      <a href="/applications">Applications</a>
      <a href="/intervention">Intervention</a>
      <a href="/pipeline">Pipeline</a>
      <a href="/summary">Summary</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Top loading bar for HTMX requests.
    var bar = document.getElementById('loadbar');
    document.body.addEventListener('htmx:beforeRequest', function () { bar.classList.add('on'); });
    document.body.addEventListener('htmx:afterRequest', function () {
      bar.classList.remove('on');
    });
    // Loader on plain (non-HTMX) form submits: disable the button + show "Working…".
    document.addEventListener('submit', function (e) {
      var btn = e.target.querySelector('button[type=submit], button:not([type])');
      if (btn && !btn.hasAttribute('hx-post')) {
        setTimeout(function () { btn.disabled = true; btn.textContent = 'Working…'; }, 0);
      }
    });
  </script>
</body>
</html>
