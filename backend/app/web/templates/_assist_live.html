<div id="cobrowse-{{ app_id }}" class="cobrowse">
  <div class="cobrowse-bar">
    <span id="as-{{ app_id }}" class="badge"
          hx-get="/intervention/{{ app_id }}/assist-status"
          hx-trigger="load, every 2s" hx-swap="outerHTML">connecting…</span>
    <form method="post" action="/intervention/{{ app_id }}/done" style="display:inline;">
      <button type="submit">✓ I submitted — mark done</button>
    </form>
    <button type="button" onclick="closeCobrowse{{ app_id }}()">Close view</button>
  </div>
  <p class="muted" style="margin:.35rem 0;">Solve the captcha and click <strong>Submit</strong> directly in the view below
  (it's the real application, running for you). Then click “I submitted — mark done”.</p>
  <img id="screen-{{ app_id }}" class="cobrowse-screen" tabindex="0"
       width="1280" height="800" alt="live application view">
  <script>
  (function () {
    const VW = 1280, VH = 800;
    const img = document.getElementById("screen-{{ app_id }}");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws/assist/{{ app_id }}`);
    ws.binaryType = "blob";
    let cur = null;
    ws.onmessage = (e) => {
      const u = URL.createObjectURL(e.data);
      img.onload = () => { if (cur) URL.revokeObjectURL(cur); cur = u; };
      img.src = u;
    };
    function pt(e) {
      const r = img.getBoundingClientRect();
      return { x: Math.round((e.clientX - r.left) * VW / r.width),
               y: Math.round((e.clientY - r.top) * VH / r.height) };
    }
    function send(o) { if (ws.readyState === 1) ws.send(JSON.stringify(o)); }
    img.addEventListener("click", (e) => { const p = pt(e); send({ type: "click", x: p.x, y: p.y }); img.focus(); });
    img.addEventListener("mousedown", (e) => { const p = pt(e); send({ type: "down", x: p.x, y: p.y }); });
    img.addEventListener("mouseup", (e) => { const p = pt(e); send({ type: "up", x: p.x, y: p.y }); });
    img.addEventListener("mousemove", (e) => { if (e.buttons) { const p = pt(e); send({ type: "move", x: p.x, y: p.y }); } });
    img.addEventListener("wheel", (e) => { e.preventDefault(); send({ type: "scroll", dx: e.deltaX, dy: e.deltaY }); }, { passive: false });
    img.addEventListener("keydown", (e) => {
      e.preventDefault();
      if (e.key.length === 1) send({ type: "text", text: e.key });
      else send({ type: "key", key: e.key });
    });
    window["closeCobrowse{{ app_id }}"] = function () {
      try { ws.send(JSON.stringify({ type: "done" })); } catch (_) {}
      try { ws.close(); } catch (_) {}
      const box = document.getElementById("cobrowse-{{ app_id }}");
      if (box) box.remove();
    };
  })();
  </script>
</div>
