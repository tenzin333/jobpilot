{% extends "base.html" %}
{% block title %}Discover — Job Applier Agent{% endblock %}
{% block content %}
<h1>Discover <span class="badge">{{ rows | length }}</span></h1>

<div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
  <form method="post" action="/jobs/discover"><button type="submit">Discover &amp; score</button></form>
  <form method="post" action="/applications/rank"><button type="submit">Re-score</button></form>
  <form method="post" action="/jobs/clear" onsubmit="return confirm('Delete ALL jobs and applications?');">
    <button type="submit" style="background:#b91c1c;">Clear all</button>
  </form>
</div>

{# Live status panel (self-polls while a discover/score run is active). #}
<div id="pipeline-status" hx-get="/pipeline/status" hx-trigger="load" hx-swap="outerHTML" style="margin-bottom:1rem;"></div>

{% include "jobs_grid.html" %}
{% endblock %}
